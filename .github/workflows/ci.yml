name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Lint GitHub Actions
        uses: docker://rhysd/actionlint:1.7.12

      - name: Install linters
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes \
            libxml2-utils \
            lua5.4 \
            shellcheck

      - name: Validate shell syntax
        shell: bash
        run: |
          mapfile -d '' files < <(git ls-files -z -- '*.sh')
          ((${#files[@]} == 0)) || bash -n -- "${files[@]}"

      - name: Run ShellCheck
        shell: bash
        run: |
          mapfile -d '' files < <(
            git ls-files -z -- '*.sh' ':(exclude).specify/**'
          )
          ((${#files[@]} == 0)) || shellcheck --severity=warning -- "${files[@]}"

      - name: Validate JSON and YAML
        shell: bash
        run: |
          git ls-files -z -- '*.json' | xargs -0 -r -n1 jq empty
          git ls-files -z -- '*.yml' '*.yaml' | \
            xargs -0 -r ruby -e \
              'require "yaml"; ARGV.each { |path| YAML.parse_file(path) }' --

      - name: Validate mod data files
        shell: bash
        run: |
          git ls-files -z -- '*.xml' '*.modinfo' | xargs -0 -r xmllint --noout
          git ls-files -z -- '*.lua' | xargs -0 -r -n1 luac5.4 -p

  release:
    name: Release
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine release version
        id: version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail

          classify() {
            local message="$1"
            local subject="${message%%$'\n'*}"
            local breaking='^(feat|fix)(\([^)]*\))?!:'
            local feature='^feat(\([^)]*\))?:'
            local fix='^fix(\([^)]*\))?:'

            if grep -q '^BREAKING CHANGE:' <<<"$message" || \
              [[ "$subject" =~ $breaking ]]; then
              printf 'major\n'
            elif [[ "$subject" =~ $feature ]]; then
              printf 'minor\n'
            elif [[ "$subject" =~ $fix ]]; then
              printf 'patch\n'
            else
              printf 'none\n'
            fi
          }

          bump="$(classify "$HEAD_MESSAGE")"
          if [[ "$bump" == "none" ]]; then
            pr_title="$(
              gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
                --jq 'map(select(.merged_at != null))[0].title // ""'
            )"
            bump="$(classify "$pr_title")"
          fi

          if [[ "$bump" == "none" ]]; then
            echo "release=false" >>"$GITHUB_OUTPUT"
            echo "No release: the merged change is not a feat, fix, or breaking change."
            exit 0
          fi

          tag="$(
            git tag --points-at "$GITHUB_SHA" | \
              grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true
          )"

          if [[ -z "$tag" ]]; then
            latest=""
            while IFS= read -r candidate; do
              if [[ "$candidate" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                latest="$candidate"
                break
              fi
            done < <(git tag --list 'v*' --sort=-version:refname)

            if [[ -z "$latest" ]]; then
              next="0.1.0"
            else
              version="${latest#v}"
              IFS=. read -r major minor patch <<<"$version"
              case "$bump" in
                major) next="$((major + 1)).0.0" ;;
                minor) next="${major}.$((minor + 1)).0" ;;
                patch) next="${major}.${minor}.$((patch + 1))" ;;
              esac
            fi
            tag="v${next}"
          fi

          echo "release=true" >>"$GITHUB_OUTPUT"
          echo "tag=$tag" >>"$GITHUB_OUTPUT"
          echo "Release: $tag ($bump)"

      - name: Package mod
        id: package
        if: steps.version.outputs.release == 'true'
        shell: bash
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          if [[ ! -f Argentina.modinfo ]]; then
            echo "::error::Argentina.modinfo is required for an installable release."
            exit 1
          fi

          package_root="dist/Argentina"
          mkdir -p "$package_root"
          cp Argentina.modinfo "$package_root/"
          [[ ! -f LICENSE ]] || cp LICENSE "$package_root/"

          for directory in Gameplay Text UI Art; do
            [[ ! -d "$directory" ]] || cp -R "$directory" "$package_root/"
          done

          archive="civilization_VI_argentina-${TAG}.zip"
          (
            cd dist
            zip -q -r "$archive" Argentina
          )
          echo "archive=dist/$archive" >>"$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        if: steps.version.outputs.release == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          ARCHIVE: ${{ steps.package.outputs.archive }}
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ARCHIVE" --clobber
            echo "Release $TAG already exists; refreshed its package."
            exit 0
          fi

          gh release create "$TAG" "$ARCHIVE" \
            --generate-notes \
            --target "$GITHUB_SHA" \
            --title "Argentina $TAG"
